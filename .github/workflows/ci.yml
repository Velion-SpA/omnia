name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build, Vet, Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        # internal/mcp is excluded: it has known preexisting failures around
        # a hardcoded "engram" project fixture, tracked separately and not a
        # CI regression signal. Everything else runs with -short.
        run: go test -short $(go list ./... | grep -v '/internal/mcp$')

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run e2e tests
        run: go test -tags e2e ./internal/server/...
