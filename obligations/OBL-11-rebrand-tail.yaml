id: OBL-11
title: Rebrand tail — user-facing strings, MCP identity decision, flag consistency, stale docs
status: pending
priority: P2
blocks_homelab_test: false
estimated_effort: M
recommended_model: sonnet-5
depends_on: []
tags: [rebrand, ux, cli, tui, docs]

context: |
  The core rebrand (binary, data dir, env vars, MCP instructions, 61 docs) is done and
  committed. What remains is the user-VISIBLE tail: the TUI still spells ENGRAM in ASCII
  art, a few CLI headers say Engram, a flag is literally named --engram, the
  --cloud vs --cloud-name inconsistency, and one stale doc. Separately there is a
  DECISION to make about the MCP server identity string (engram), which is a stable
  cross-agent namespace — renaming it breaks existing installs.

current_state: |
  - TUI splash ASCII art spells ENGRAM; tagline "engram <version> — An elephant never forgets".
    evidence: internal/tui/view.go:16-22, 54
  - TUI wizard post-install text references engram.
    evidence: internal/tui/view.go:617,651,659
  - CLI headers still say Engram: "Engram Memory Stats" (cmd/omnia/main.go:1417),
    "Engram Doctor:" (cmd/omnia/doctor.go:235), "Starting Engram cloud server"
    (cmd/omnia/cloud.go:990).
  - A dashboard daemon-URL flag is literally named --engram (description already says Omnia).
    evidence: cmd/omnia/dashboard.go:20
  - Flag-name inconsistency --cloud vs --cloud-name across subcommands.
    evidence: cmd/omnia/cloud.go (config/login/refresh); cmd/omnia/main.go (sync/enroll)
  - MCP server identity is "engram" across ALL agents (opencode/claude-code/gemini/codex/pi)
    — a stable namespace, not an accidental miss.
    evidence: internal/setup/setup.go:81,436-455,684-700,828,864-904,1052-1060,1223-1253;
    allowlist prefixes setup.go:94-114
  - PRUEBA-LOCAL.md still documents the /dashboard route which is now a 301 redirect to /.
    evidence: internal/cloud/cloudserver/dashboard_mount.go:68-77; PRUEBA-LOCAL.md

gap: |
  Clean the visible seams and DECIDE on the MCP identity. Preserve on-disk/wire names.

tasks: |
  1. Replace the TUI ENGRAM ASCII art + tagline with OMNIA (internal/tui/view.go:16-22,54)
     and fix the wizard strings (view.go:617,651,659) — but keep any string that
     ACCURATELY refers to the literal MCP id engram until the identity decision below is made.
  2. Fix CLI headers: "Engram Memory Stats" -> "Omnia Memory Stats" (main.go:1417);
     "Engram Doctor" -> "Omnia Doctor" (doctor.go:235); "Starting Engram cloud server" ->
     "Starting Omnia cloud server" (cloud.go:990).
  3. Rename the --engram dashboard flag to --daemon-url (keep --engram as a hidden
     deprecated alias) (cmd/omnia/dashboard.go:20).
  4. Standardize cloud alias flag on --cloud-name everywhere; keep --cloud as a hidden
     alias (coordinate with OBL-07).
  5. MCP IDENTITY DECISION (write it in this file before acting): keep engram (stable,
     non-breaking, matches published plugin marketplace Gentleman-Programming/engram) OR
     migrate to omnia (breaks existing installs; needs setup re-run on every machine + a
     new marketplace/plugin). RECOMMENDATION: keep engram as the tool namespace for now —
     the product is Omnia, the tool namespace is a compatibility surface like the .engram/
     dir and the cookie name. Migrate only once Omnia ships its own plugin marketplace.
     Document this so it stops looking like an oversight.
  6. Refresh PRUEBA-LOCAL.md: replace /dashboard URLs with / (root); fix stale routing
     notes; if OBL-06 lands, update the two-data-dir workaround note.
  7. Do NOT touch env var names, cloud.json keys, table names, cookie, .engram/ dir, LICENSE.

acceptance_criteria: |
  - No user-facing CLI/TUI output says Engram except where it accurately names the literal
    MCP tool id (and that choice is documented).
  - The MCP-identity decision is written down with rationale.
  - --cloud-name is the canonical flag; --cloud still works (hidden).
  - PRUEBA-LOCAL.md uses the current routes.

verification: |
  - go build ./... && go test ./... (except the known-preexisting internal/mcp
    TestHandleSave failures)
  - Manual: run omnia, omnia doctor, omnia stats, omnia cloud serve and eyeball banners;
    launch the TUI and check the splash.

do_not_touch: |
  - MCP tool NAMESPACE strings until the decision says otherwise; env names; cloud.json;
    cookie engram_dashboard_token; cloud_ tables; .engram/ dir; LICENSE/attribution.

