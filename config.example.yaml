engram:
  base_url: http://127.0.0.1:7437
  default_project: omnia

# Per-origin project routing.
# Resolution order: routes map → default (repo name / guild slug) → default_project.
# github key format: github/{owner}/{repo}
# discord key format: discord/{channel_id}
routes:
  github/arratiabenjamin/saluvita: saluvita
  # discord/123456789: saluvita

sources:
  discord:
    enabled: false
    channels:
      - id: "123456789"
        name: dev-help
        guild: my-server

  github:
    enabled: true
    repos:
      - owner/repo

backfill_days: 30

# Omnia's own local semantic-search index. Disabled by default: off keeps
# `omnia embed` a no-op and the dashboard serves keyword (FTS) search only.
# model accepts any Ollama-served embedding model; jina/jina-embeddings-v2-base-es
# is the shipped default and stays default until an eval-gated swap is
# recorded (no code changes needed to select a different model).
# embeddinggemma:300m (Google's Matryoshka-trained 300M-parameter model) is a
# selectable MRL-capable alternative: for MRL-capable models only, dim may be
# set BELOW the model's native output (768/256/128) to truncate + re-normalize
# instead of always using the full dimension. Setting dim below a NON-MRL
# model's native output (e.g. jina below 768) is rejected at config-validation
# time, not silently truncated.
# embeddings:
#   enabled: true
#   base_url: http://localhost:11434  # Ollama base URL
#   model: jina/jina-embeddings-v2-base-es  # or embeddinggemma:300m (MRL-capable)
#   dim: 768  # embeddinggemma:300m also accepts 256 or 128 (Matryoshka truncation)
#   db_path: ~/.local/share/omnia/embeddings.db

# Hybrid (lexical+semantic) recall fusion for mem_search. Disabled by
# default: off calls store.Search directly, byte-for-byte today's FTS5-only
# path — zero engram.db migration. Requires `embeddings.enabled: true` above.
# recall:
#   enabled: true
#   rrf_k: 60
#   dense_k: 5
#   strong_floor: 0.65
#   base_floor: 0.55
#   max_results: 50

# Omnia v0.3 "Context Economy": token-based injection budget for mem_search.
# Disabled by default: off keeps handleSearch's output byte-for-byte
# identical to today. Top-ranked results are kept COMPLETE, in rank order,
# until the next one would exceed max_tokens (estimated via a cheap
# char/4 heuristic, not a real tokenizer) — no result is ever partially
# truncated. The topic_key exact-match sentinel and error-signature-match
# rows are always emitted complete and never count against this budget.
# injection:
#   budget:
#     enabled: true
#     max_tokens: 1500
