version: 2

project_name: omnia

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/omnia
    binary: omnia
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    hooks:
      post:
        - cmd: sh -c 'if [ "{{ .Os }}" = "darwin" ] && command -v codesign >/dev/null 2>&1; then codesign --force --sign - "{{ .Path }}"; fi'

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: Velion-SpA
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    # TODO: flip to false once the TAP_GITHUB_TOKEN secret (PAT with contents:write
    # on Velion-SpA/homebrew-tap) is configured — until then the formula is updated
    # manually and the release must not depend on the secret.
    skip_upload: true
    name: omnia
    homepage: "https://github.com/Velion-SpA/omnia"
    description: "Persistent memory for AI coding agents — local-first with self-hosted multi-tenant cloud sync"
    license: "MIT"
    commit_author:
      name: Benjamin Arratia
      email: benjamin.arratia.santibanez@gmail.com
    commit_msg_template: "chore: update omnia formula to {{ .Tag }}"
