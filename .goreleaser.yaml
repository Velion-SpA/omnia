version: 2

project_name: omnia

before:
  hooks:
    - go mod tidy
    # Eval-harness release gate (spec sdd/omnia-eval-harness EVAL-8) — NOT
    # wired in yet, intentionally. `omnia eval` is advisory-by-default and
    # exits non-zero only in --mode blocking past --threshold; today's
    # eval corpus (internal/eval/testdata/cases.json, 11 cases) is still
    # below spec EVAL-2's 50-case production floor, so a live hook here
    # would abort EVERY release until that corpus-authoring follow-up
    # lands. Uncomment once the corpus reaches 50+ cases and a real
    # --baseline accuracy has been established:
    #
    # - cmd: sh -c 'go run ./cmd/omnia eval --mode advisory --runs 3 --baseline 0.80 --threshold 0.05'
    #
    # Flip --mode to blocking only after the advisory numbers have been
    # observed stable across several releases (spec EVAL-8's own guidance:
    # advisory MUST be the default until a team is confident in the gate).

builds:
  - main: ./cmd/omnia
    binary: omnia
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    hooks:
      post:
        - cmd: sh -c 'if [ "{{ .Os }}" = "darwin" ] && command -v codesign >/dev/null 2>&1; then codesign --force --sign - "{{ .Path }}"; fi'

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: Velion-SpA
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    # Auto-push to the tap needs a HOMEBREW_TAP_TOKEN secret with write access to
    # Velion-SpA/homebrew-tap. Until that secret exists, skip the push (goreleaser
    # still generates the formula); the tap formula is updated out of band.
    skip_upload: "true"
    directory: Formula
    name: omnia
    homepage: "https://github.com/Velion-SpA/omnia"
    description: "Persistent memory for AI coding agents. Agent-agnostic, single binary, zero dependencies."
    license: "MIT"
    commit_msg_template: "chore: update omnia formula to {{ .Tag }}"
